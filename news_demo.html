<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>News & AI Interpretation Demo</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50">
    <div class="max-w-4xl mx-auto p-6">
        <!-- Header -->
        <div class="bg-white rounded-xl shadow-lg p-6 mb-6">
            <h1 class="text-3xl font-bold text-slate-800 mb-2">📰 Latest News & AI Investment Analysis</h1>
            <p class="text-slate-600">Enter a ticker to see factual news with AI-powered investment analysis</p>

            <!-- Search Box -->
            <div class="mt-4 flex gap-2">
                <input
                    type="text"
                    id="ticker-input"
                    placeholder="Enter ticker (AMD, AVGO, ORCL, LAC...)"
                    class="flex-1 px-4 py-2 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
                    onkeypress="if(event.key==='Enter') loadNews()"
                />
                <button
                    onclick="loadNews()"
                    class="px-6 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition-colors font-medium"
                >
                    Search
                </button>
            </div>

            <!-- Quick Tickers -->
            <div class="mt-3 flex gap-2 flex-wrap">
                <span class="text-sm text-slate-600">Try:</span>
                <button onclick="loadTickerNews('AMD')" class="px-3 py-1 bg-slate-100 hover:bg-slate-200 rounded text-sm font-medium">AMD</button>
                <button onclick="loadTickerNews('AVGO')" class="px-3 py-1 bg-slate-100 hover:bg-slate-200 rounded text-sm font-medium">AVGO</button>
                <button onclick="loadTickerNews('ORCL')" class="px-3 py-1 bg-slate-100 hover:bg-slate-200 rounded text-sm font-medium">ORCL</button>
                <button onclick="loadTickerNews('LAC')" class="px-3 py-1 bg-slate-100 hover:bg-slate-200 rounded text-sm font-medium">LAC</button>
            </div>
        </div>

        <!-- Content Area -->
        <div id="content-area"></div>
    </div>

    <script>
        function loadTickerNews(ticker) {
            document.getElementById('ticker-input').value = ticker;
            loadNews();
        }

        async function loadNews() {
            const ticker = document.getElementById('ticker-input').value.trim().toUpperCase();
            if (!ticker) {
                alert('Please enter a ticker symbol');
                return;
            }

            const contentArea = document.getElementById('content-area');
            contentArea.innerHTML = `
                <div class="bg-white rounded-xl shadow-lg p-8 text-center">
                    <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-blue-600 mx-auto"></div>
                    <p class="mt-4 text-slate-600">Loading news for ${ticker}...</p>
                </div>
            `;

            try {
                const response = await fetch(`http://localhost:8000/api/latest-news/${ticker}`);
                const result = await response.json();

                if (result.status === 'success') {
                    renderNews(result.data);
                } else {
                    contentArea.innerHTML = `
                        <div class="bg-red-50 border border-red-200 rounded-xl p-6 text-red-700">
                            <strong>Error:</strong> ${result.message || 'Failed to load news'}
                        </div>
                    `;
                }
            } catch (error) {
                contentArea.innerHTML = `
                    <div class="bg-red-50 border border-red-200 rounded-xl p-6 text-red-700">
                        <strong>Error:</strong> Failed to connect to server. Make sure the server is running at http://localhost:8000
                    </div>
                `;
            }
        }

        function renderNews(data) {
            const contentArea = document.getElementById('content-area');

            if (!data.articles || data.articles.length === 0) {
                contentArea.innerHTML = `
                    <div class="bg-yellow-50 border border-yellow-200 rounded-xl p-6 text-yellow-700">
                        No recent news available for ${data.ticker}
                    </div>
                `;
                return;
            }

            // Parse interpretation
            let recommendation = 'N/A';
            let recommendationClass = 'bg-slate-100 text-slate-800';
            let reasoning = '';
            let interpretationText = 'Analysis not available.';

            if (data.interpretation) {
                const recMatch = data.interpretation.match(/RECOMMENDATION:\s*(BUY|HOLD|SELL)/);
                const reasonMatch = data.interpretation.match(/REASONING:\s*(.+?)(?:\n|$)/s);

                if (recMatch) {
                    recommendation = recMatch[1];
                    if (recommendation === 'BUY') recommendationClass = 'bg-green-100 text-green-800';
                    if (recommendation === 'HOLD') recommendationClass = 'bg-blue-100 text-blue-800';
                    if (recommendation === 'SELL') recommendationClass = 'bg-red-100 text-red-800';
                }
                if (reasonMatch) {
                    reasoning = reasonMatch[1].trim();
                }
                interpretationText = data.interpretation.replace(/INTERPRETATION:\s*/i, '').split(/RECOMMENDATION:|REASONING:/)[0].trim();
            }

            // Render articles
            const articlesHtml = data.articles.map((article, index) => `
                <div class="border border-slate-200 rounded-lg p-4 hover:shadow-md transition-shadow">
                    <a href="${article.link}" target="_blank" class="text-slate-800 hover:text-blue-600 font-medium text-base block mb-2">
                        ${article.title}
                    </a>
                    <div class="text-xs text-slate-500 flex items-center gap-2 mb-2">
                        <span class="font-medium">${article.publisher}</span>
                        <span>•</span>
                        <span>${new Date(article.publish_time).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' })}</span>
                        ${article.filtered_by_llm ? '<span class="ml-2 px-2 py-0.5 bg-blue-50 text-blue-600 rounded text-xs font-medium">✓ Verified</span>' : ''}
                    </div>
                    ${article.summary ? `<p class="text-sm text-slate-600">${article.summary}</p>` : ''}
                </div>
            `).join('');

            contentArea.innerHTML = `
                <div class="bg-white rounded-xl shadow-lg p-6">
                    <!-- Header -->
                    <div class="flex items-center justify-between mb-4 pb-4 border-b border-slate-200">
                        <div>
                            <h2 class="text-2xl font-bold text-slate-800">${data.ticker}</h2>
                            <p class="text-sm text-slate-500">Latest Headlines (${data.total_articles})</p>
                        </div>
                        ${data.fetch_timestamp ? `<span class="text-xs text-slate-400">Updated ${new Date(data.fetch_timestamp).toLocaleString()}</span>` : ''}
                    </div>

                    <!-- News Articles -->
                    <div class="space-y-3 mb-6">
                        ${articlesHtml}
                    </div>

                    <!-- AI Interpretation (Foldable) -->
                    <div class="border-t border-slate-300 pt-4">
                        <button
                            onclick="toggleInterpretation()"
                            id="interp-toggle"
                            class="w-full flex items-center justify-between p-4 bg-slate-50 hover:bg-slate-100 rounded-lg transition-colors border border-slate-200"
                        >
                            <div class="flex items-center gap-3">
                                <span class="text-base font-semibold text-slate-800">🤖 AI Investment Analysis</span>
                                <span class="px-3 py-1 rounded-full text-xs font-bold ${recommendationClass}">
                                    ${recommendation}
                                </span>
                            </div>
                            <svg id="interp-arrow" class="w-5 h-5 text-slate-600 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path>
                            </svg>
                        </button>

                        <div id="interp-content" class="hidden mt-3 bg-slate-50 rounded-lg p-4 border border-slate-200">
                            <p class="text-sm text-slate-700 leading-relaxed mb-3">${interpretationText}</p>
                            ${reasoning ? `
                                <div class="border-t border-slate-200 pt-3">
                                    <p class="text-xs font-semibold text-slate-600 mb-1">Key Reasoning:</p>
                                    <p class="text-xs text-slate-600 italic">${reasoning}</p>
                                </div>
                            ` : ''}
                            ${data.interpretation_timestamp ? `
                                <div class="mt-3 text-xs text-slate-400">
                                    Analysis generated ${new Date(data.interpretation_timestamp).toLocaleString()}
                                </div>
                            ` : ''}
                        </div>
                    </div>
                </div>
            `;
        }

        function toggleInterpretation() {
            const content = document.getElementById('interp-content');
            const arrow = document.getElementById('interp-arrow');

            if (content.classList.contains('hidden')) {
                content.classList.remove('hidden');
                arrow.style.transform = 'rotate(180deg)';
            } else {
                content.classList.add('hidden');
                arrow.style.transform = 'rotate(0deg)';
            }
        }

        // Auto-load AMD on page load for demo
        window.addEventListener('load', () => {
            document.getElementById('ticker-input').value = 'AMD';
            loadNews();
        });
    </script>
</body>
</html>
