# Cloud Build configuration for deep_alpha_copilot
# Automatically builds and deploys to Cloud Run when pushed to main branch

steps:
  # Build the container image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/deep-alpha-copilot:$_VERSION_TAG'
      - '-t'
      - 'gcr.io/$PROJECT_ID/deep-alpha-copilot:latest'
      - '.'

  # Push the container image to Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'gcr.io/$PROJECT_ID/deep-alpha-copilot:$_VERSION_TAG'

  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'gcr.io/$PROJECT_ID/deep-alpha-copilot:latest'

  # Deploy to Cloud Run
  - name: 'gcr.io/cloud-builders/gcloud'
    args:
      - 'run'
      - 'deploy'
      - 'deep-alpha-copilot'
      - '--image=gcr.io/$PROJECT_ID/deep-alpha-copilot:$_VERSION_TAG'
      - '--region=us-central1'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--memory=2Gi'
      - '--timeout=900s'
      - '--max-instances=1'
      - '--set-env-vars=GCP_PROJECT_ID=$PROJECT_ID'

images:
  - 'gcr.io/$PROJECT_ID/deep-alpha-copilot:$_VERSION_TAG'
  - 'gcr.io/$PROJECT_ID/deep-alpha-copilot:latest'

substitutions:
  _VERSION_TAG: 'manual'

timeout: '1200s'

options:
  machineType: 'E2_HIGHCPU_8'
