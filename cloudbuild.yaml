steps:
# Build the container image
- name: 'gcr.io/cloud-builders/docker'
  args: ['build', '-t', 'gcr.io/$PROJECT_ID/financial-agent-worker', '.']

# Push the container image to Container Registry
- name: 'gcr.io/cloud-builders/docker'
  args: ['push', 'gcr.io/$PROJECT_ID/financial-agent-worker']

# Deploy container image to Cloud Run
- name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
  entrypoint: gcloud
  args:
  - 'run'
  - 'deploy'
  - 'financial-agent-worker'
  - '--image=gcr.io/$PROJECT_ID/financial-agent-worker'
  - '--region=us-central1' # Change to your desired region
  - '--platform=managed'
  - '--no-allow-unauthenticated'
  - '--memory=2Gi'
  - '--timeout=3600'
  - '--concurrency=1' # Process one task at a time
  - '--set-env-vars=REDIS_HOST=[YOUR_REDIS_HOST],REDIS_PORT=[YOUR_REDIS_PORT]' # Replace with your Redis instance details

images:
- 'gcr.io/$PROJECT_ID/financial-agent-worker'
